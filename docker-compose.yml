services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: merlin
      POSTGRES_USER: merlin
      POSTGRES_PASSWORD: merlin
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merlin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  timescaledb_data:
